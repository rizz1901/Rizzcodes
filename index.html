<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ribbon Showcase</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F9F9F9; font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "framer-motion": "https://esm.sh/framer-motion@11.11.17",
      "ogl": "https://esm.sh/ogl@0.0.117"
    }
  }
  </script>
  <script type="module">
    import React, { useEffect, useRef, useState } from 'react';
    import { createRoot } from 'react-dom/client';
    import { motion, AnimatePresence } from 'framer-motion';
    import { Renderer, Transform, Vec3, Color, Polyline } from 'ogl';

    const Ribbons = ({ colors = ['#ff9346','#7cff67','#ffee51','#5227FF'], baseSpring = 0.03, baseFriction = 0.9, baseThickness = 30, offsetFactor = 0.05, maxAge = 500, pointCount = 50, speedMultiplier = 0.6, enableFade = false, enableShaderEffect = false, effectAmplitude = 2, backgroundColor = [0,0,0,0] }) => {
      const containerRef = useRef(null);
      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;
        const renderer = new Renderer({ dpr: window.devicePixelRatio || 2, alpha: true });
        const gl = renderer.gl;
        gl.clearColor(...backgroundColor);
        gl.canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%';
        container.appendChild(gl.canvas);
        const scene = new Transform();
        const lines = [];
        const vertex = `precision highp float;attribute vec3 position,next,prev;attribute vec2 uv;attribute float side;uniform vec2 uResolution;uniform float uDPR,uThickness,uTime,uEnableShaderEffect,uEffectAmplitude;varying vec2 vUV;vec4 getPosition(){vec4 cur=vec4(position,1.);vec2 asp=vec2(uResolution.x/uResolution.y,1.);vec2 ns=next.xy*asp,ps=prev.xy*asp;vec2 tan=normalize(ns-ps),nor=vec2(-tan.y,tan.x);nor/=asp;nor*=mix(1.,.1,pow(abs(uv.y-.5)*2.,2.));nor*=smoothstep(0.,.02,length(ns-ps));float pwr=1./(uResolution.y/uDPR);nor*=cur.w*pwr*uThickness;cur.xy-=nor*side;if(uEnableShaderEffect>.5)cur.xy+=nor*sin(uTime+cur.x*10.)*uEffectAmplitude;return cur;}void main(){vUV=uv;gl_Position=getPosition();}`;
        const fragment = `precision highp float;uniform vec3 uColor;uniform float uOpacity,uEnableFade;varying vec2 vUV;void main(){float f=uEnableFade>.5?1.-smoothstep(0.,1.,vUV.y):1.;gl_FragColor=vec4(uColor,uOpacity*f);}`;
        const resize = () => { if(!container)return; renderer.setSize(container.clientWidth,container.clientHeight); lines.forEach(l=>l.polyline.resize()); };
        window.addEventListener('resize', resize);
        const center = (colors.length-1)/2;
        colors.forEach((color,i) => {
          const pts = Array.from({length:pointCount},()=>new Vec3());
          const line = { spring: baseSpring+(Math.random()-.5)*.05, friction: baseFriction+(Math.random()-.5)*.05, mouseVelocity: new Vec3(), mouseOffset: new Vec3((i-center)*offsetFactor+(Math.random()-.5)*.01,(Math.random()-.5)*.1,0), points: pts, polyline: null };
          line.polyline = new Polyline(gl,{points:pts,vertex,fragment,uniforms:{uColor:{value:new Color(color)},uThickness:{value:baseThickness+(Math.random()-.5)*3},uOpacity:{value:1},uTime:{value:0},uEnableShaderEffect:{value:enableShaderEffect?1:0},uEffectAmplitude:{value:effectAmplitude},uEnableFade:{value:enableFade?1:0}}});
          line.polyline.mesh.setParent(scene);
          lines.push(line);
        });
        resize();
        const mouse = new Vec3();
        const updateMouse = e => {
          const rect = container.getBoundingClientRect();
          const t = e.changedTouches?.[0] || e;
          mouse.set((t.clientX-rect.left)/container.clientWidth*2-1,(t.clientY-rect.top)/container.clientHeight*-2+1,0);
        };
        container.addEventListener('mousemove',updateMouse);
        container.addEventListener('touchstart',updateMouse,{passive:false});
        container.addEventListener('touchmove',updateMouse,{passive:false});
        let fId, last=performance.now();
        const update = () => {
          fId=requestAnimationFrame(update);
          const now=performance.now(), dt=now-last; last=now;
          lines.forEach(l=>{
            const tmp=new Vec3(); tmp.copy(mouse).add(l.mouseOffset).sub(l.points[0]).multiply(l.spring);
            l.mouseVelocity.add(tmp).multiply(l.friction); l.points[0].add(l.mouseVelocity);
            for(let i=1;i<l.points.length;i++) l.points[i].lerp(l.points[i-1],Math.min(1,dt*speedMultiplier/(maxAge/(l.points.length-1))));
            if(l.polyline.mesh.program.uniforms.uTime) l.polyline.mesh.program.uniforms.uTime.value=now*.001;
            l.polyline.updateGeometry();
          });
          renderer.render({scene});
        };
        update();
        return () => {
          window.removeEventListener('resize',resize);
          container.removeEventListener('mousemove',updateMouse);
          cancelAnimationFrame(fId);
          if(gl.canvas.parentNode===container) container.removeChild(gl.canvas);
        };
      }, []);
      return React.createElement('div',{ref:containerRef,style:{position:'relative',width:'100%',height:'100%',cursor:'none'}});
    };

    function App() {
      const [hovered, setHovered] = useState(false);
      return React.createElement('div',{style:{minHeight:'100vh',background:'#F9F9F9',display:'flex',alignItems:'center',justifyContent:'center',padding:'80px'}},
        React.createElement(motion.div,{initial:{opacity:0,y:20},animate:{opacity:1,y:0},transition:{duration:.6,ease:[.19,1,.22,1]},style:{position:'relative',width:'100%',maxWidth:'896px',aspectRatio:'16/9',background:'white',borderRadius:'2rem',boxShadow:'0 40px 80px rgba(0,0,0,.05)',overflow:'hidden'},onMouseEnter:()=>setHovered(true),onMouseLeave:()=>setHovered(false)},
          React.createElement('div',{style:{position:'absolute',inset:0,zIndex:0}},
            React.createElement(Ribbons,{baseThickness:40,colors:['#1A1A1B'],speedMultiplier:.5,maxAge:600,enableFade:true,enableShaderEffect:true,effectAmplitude:1.5,backgroundColor:[0,0,0,0]})
          ),
          React.createElement('div',{style:{position:'absolute',inset:0,zIndex:10,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none',textAlign:'center',padding:'48px'}},
            React.createElement(motion.h1,{initial:{opacity:0},animate:{opacity:1},transition:{delay:.4,duration:.8},style:{fontSize:'2.5rem',fontWeight:500,letterSpacing:'-.05em',color:'#1A1A1B',marginBottom:'8px'}},'Fluid Motion'),
            React.createElement(motion.p,{initial:{opacity:0},animate:{opacity:1},transition:{delay:.6,duration:.8},style:{color:'#888'}},'A Minimalist WebGL Ribbon Showcase')
          ),
          React.createElement(AnimatePresence,null,hovered&&React.createElement(motion.button,{key:'btn',initial:{opacity:0,scale:.9,y:10},animate:{opacity:1,scale:1,y:0},exit:{opacity:0,scale:.9,y:10},transition:{duration:.3},onClick:()=>window.location.reload(),style:{position:'absolute',bottom:'32px',right:'32px',zIndex:20,padding:'12px 24px',background:'#1A1A1B',color:'white',borderRadius:'9999px',fontSize:'.875rem',border:'none',cursor:'pointer'}},'Replay Animation')),
          React.createElement(motion.div,{style:{position:'absolute',bottom:0,left:0,height:'4px',background:'#1A1A1B',width:'100%',transformOrigin:'left'},initial:{scaleX:0},animate:{scaleX:hovered?1:0},transition:{duration:.6,ease:[.19,1,.22,1]}})
        )
      );
    }
    createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
